<form *ngIf="vendor">
  <mat-card class="cardWithShadow theme-card">
    <!--    <mat-card-header>-->
    <!--      <mat-card-title class="m-b-0">Basic Header Form</mat-card-title>-->
    <!--    </mat-card-header>-->
    <mat-card-content class="b-t-1">
      <div class="p-16 bg-light-primary rounded">
        <h5 class="mat-subtitle-2 text-primary d-flex align-items-center f-w-600">
          <i-tabler class="icon-20 m-r-8 d-flex" name="info-circle"></i-tabler
          >
          <!--          1-->
        </h5>
      </div>

      <div class="row m-t-20">
        <div class="col-lg-6">
          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >Statut
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.status }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >Téléphone
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.phone }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >Email
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.email }}"/>
          </mat-form-field>
        </div>
        <div class="col-lg-6">
          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >Nom ou Raison Sociale
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.name }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >Adresse
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.address }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >CIN
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.nic }}"/>
          </mat-form-field>
        </div>
      </div>


      <div class="p-16 bg-light-primary rounded">
        <h5 class="mat-subtitle-2 text-primary d-flex align-items-center f-w-600">
          <i-tabler class="icon-20 m-r-8 d-flex" name="info-circle"></i-tabler
          >
          <!--          2-->
        </h5>
      </div>
      <div class="row m-t-20">
        <div class="col-lg-6">
          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >N° Compte Bancaire
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.bankAccountNumber }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block">
            Matière
          </mat-label>
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.subject }}"/>
          </mat-form-field>
        </div>

        <div class="col-lg-6">
          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >Prestation
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.service }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >Écheance
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.deadline }}"/>
          </mat-form-field>
        </div>
      </div>


      <div class="p-16 bg-light-primary rounded m-y-20">
        <h5 class="mat-subtitle-2 text-primary d-flex align-items-center f-w-600">
          <i-tabler class="icon-20 m-r-8 d-flex" name="info-circle"></i-tabler
          >
          <!--          3-->
        </h5>
      </div>

      <div class="row m-t-20">
        <div class="col-lg-6">
          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >CNSS
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.cnss }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >IF
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.fi }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >TP
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.tp }}"/>
          </mat-form-field>
        </div>

        <div class="col-lg-6">
          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >ICE
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.ice }}"/>
          </mat-form-field>

          <!-- input -->
          <mat-label class="mat-subtitle-2 f-w-600 m-b-8 d-block"
          >RC
          </mat-label
          >
          <mat-form-field appearance="outline" class="w-100">
            <input matInput placeholder="" readonly value="{{ vendor.rc }}"/>
          </mat-form-field>
        </div>
      </div>
    </mat-card-content>
    <mat-card-actions class="b-t-1">
      <button (click)="handleEditVendor(vendor.idVendor)" class="m-l-8" color="primary" mat-flat-button>Modifier
      </button>
    </mat-card-actions>
  </mat-card>

</form>
